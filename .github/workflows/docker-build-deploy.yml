  notify-slack:
    runs-on: ubuntu-latest
    needs: [build, update-gitops, verify-deployment]
    if: always()
    
    steps:
    - name: Determine status
      id: status  
      run: |
        BUILD_RESULT="${{ needs.build.result }}"
        GITOPS_RESULT="${{ needs.update-gitops.result }}"
        VERIFY_RESULT="${{ needs.verify-deployment.result }}"
        
        echo "Build: ${BUILD_RESULT}, GitOps: ${GITOPS_RESULT}, Verify: ${VERIFY_RESULT}"
        
        # If build failed, it's a failure
        if [[ "${BUILD_RESULT}" == "failure" ]]; then
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "color=danger" >> $GITHUB_OUTPUT
          echo "emoji=❌" >> $GITHUB_OUTPUT
        # If build succeeded and this is a push (deployment flow)
        elif [[ "${BUILD_RESULT}" == "success" && "${{ github.event_name }}" == "push" ]]; then
          # Check deployment results
          if [[ "${GITOPS_RESULT}" == "success" && "${VERIFY_RESULT}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          elif [[ "${GITOPS_RESULT}" == "failure" || "${VERIFY_RESULT}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          else
            echo "status=partial" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
          fi
        # If build succeeded but this is a PR (build-only)
        elif [[ "${BUILD_RESULT}" == "success" && "${{ github.event_name }}" == "pull_request" ]]; then
          echo "status=build-only" >> $GITHUB_OUTPUT
          echo "color=good" >> $GITHUB_OUTPUT
          echo "emoji=🏗️" >> $GITHUB_OUTPUT
        else
          echo "status=unknown" >> $GITHUB_OUTPUT
          echo "color=warning" >> $GITHUB_OUTPUT
          echo "emoji=❓" >> $GITHUB_OUTPUT
        fi

    - name: Get environment
      id: env
      run: |
        if [[ "${{ github.ref_name }}" == "main" ]]; then
          echo "environment=Production" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref_name }}" == "staging" ]]; then
          echo "environment=Staging" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref_name }}" == "feature/dockerfile" ]]; then
          echo "environment=Development" >> $GITHUB_OUTPUT
        else
          echo "environment=Development" >> $GITHUB_OUTPUT
        fi

    - name: Set Slack configuration
      id: slack-config
      run: |
        if [[ "${{ github.ref_name }}" == "main" ]]; then
          echo "webhook=${{ secrets.SLACK_WEBHOOK_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
          echo "channel=#production-deployments" >> $GITHUB_OUTPUT
          echo "title_prefix=PRODUCTION " >> $GITHUB_OUTPUT
          echo "alert_prefix=✅ **PRODUCTION DEPLOYMENT** ✅" >> $GITHUB_OUTPUT
        else
          echo "webhook=${{ secrets.SLACK_WEBHOOK_URL }}" >> $GITHUB_OUTPUT
          echo "channel=#deployments" >> $GITHUB_OUTPUT
          echo "title_prefix=" >> $GITHUB_OUTPUT
          echo "alert_prefix=" >> $GITHUB_OUTPUT
        fi

    - name: Send Slack notification
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ steps.slack-config.outputs.webhook }}
        SLACK_CHANNEL: ${{ steps.slack-config.outputs.channel }}
        SLACK_COLOR: ${{ steps.status.outputs.color }}
        SLACK_ICON: ${{ steps.status.outputs.emoji }}
        SLACK_MESSAGE: |
          ${{ steps.slack-config.outputs.alert_prefix }}
          *Environment:* ${{ steps.env.outputs.environment }}
          *Status:* ${{ steps.status.outputs.status }}
          *Branch:* `${{ github.ref_name }}`
          *Commit:* `${{ github.sha }}`
          *Author:* ${{ github.actor }}
          *Image Tag:* `${{ needs.build.outputs.environment }}-${{ github.sha }}`
          *Commit Message:* ${{ github.event.head_commit.message }}
          
          <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow> | <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|View Commit>
        SLACK_TITLE: '${{ steps.status.outputs.emoji }} ${{ steps.slack-config.outputs.title_prefix }}Bonat Brain API Deployment'
        SLACK_USERNAME: 'GitHub Actions'

  notify-slack-failure:
    runs-on: ubuntu-latest
    needs: [verify-deployment]
    if: failure()
    
    steps:
    - name: Get failed job
      id: failed-job
      run: |
        if [[ "${{ needs.build.result }}" == "failure" ]]; then
          echo "job=Build" >> $GITHUB_OUTPUT
          echo "step=Docker build and push to ECR" >> $GITHUB_OUTPUT
        elif [[ "${{ needs.update-gitops.result }}" == "failure" ]]; then
          echo "job=GitOps Update" >> $GITHUB_OUTPUT
          echo "step=Updating Kubernetes manifests" >> $GITHUB_OUTPUT
        elif [[ "${{ needs.verify-deployment.result }}" == "failure" ]]; then
          echo "job=Deployment Verification" >> $GITHUB_OUTPUT
          echo "step=Verifying deployment health" >> $GITHUB_OUTPUT
        fi

    - name: Set failure Slack configuration
      id: failure-slack-config
      run: |
        if [[ "${{ github.ref_name }}" == "main" ]]; then
          echo "webhook=${{ secrets.SLACK_WEBHOOK_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
          echo "channel=#production-deployments" >> $GITHUB_OUTPUT
          echo "environment=Production" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref_name }}" == "staging" ]]; then
          echo "webhook=${{ secrets.SLACK_WEBHOOK_URL }}" >> $GITHUB_OUTPUT
          echo "channel=#deployments" >> $GITHUB_OUTPUT
          echo "environment=Staging" >> $GITHUB_OUTPUT
        else
          echo "webhook=${{ secrets.SLACK_WEBHOOK_URL }}" >> $GITHUB_OUTPUT
          echo "channel=#deployments" >> $GITHUB_OUTPUT
          echo "environment=Development" >> $GITHUB_OUTPUT
        fi

    - name: Send failure notification
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ steps.failure-slack-config.outputs.webhook }}
        SLACK_CHANNEL: ${{ steps.failure-slack-config.outputs.channel }}
        SLACK_COLOR: 'danger'
        SLACK_ICON: '🚨'
        SLACK_MESSAGE: |
          *Environment:* ${{ steps.failure-slack-config.outputs.environment }}
          *Failed Job:* ${{ steps.failed-job.outputs.job }}
          *Failed Step:* ${{ steps.failed-job.outputs.step }}
          *Branch:* `${{ github.ref_name }}`
          *Author:* ${{ github.actor }}
          
          *Action Required:* Please check the workflow logs and fix the issue.
          
          <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Failed Workflow>
        SLACK_TITLE: '🚨 Deployment Failed - Bonat Brain API'
        SLACK_USERNAME: 'GitHub Actions'