<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bonat AI Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/auth.css" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2 class="auth-title">
                    <span class="brand-logo">Bonat</span> AI
                </h2>
                <p class="auth-subtitle">Create your account</p>
            </div>
            <div class="auth-body-content">
                {% if error %}
                <div class="auth-alert auth-alert-error">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ error }}
                </div>
                {% endif %}

                {% if success %}
                <div class="auth-alert auth-alert-success">
                    <i class="fas fa-check-circle"></i>
                    {{ success }}
                </div>
                {% endif %}

                <form id="register-form" method="POST" action="/register" class="auth-form">
                    <div class="form-group">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text"
                               class="auth-input"
                               id="name"
                               name="name"
                               placeholder="Enter your full name"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email"
                               class="auth-input"
                               id="email"
                               name="email"
                               placeholder="your.email@bonat.io"
                               required>
                        <small class="form-hint">Only @bonat.io emails are allowed</small>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password"
                               class="auth-input"
                               id="password"
                               name="password"
                               placeholder="Create a password (min 8 characters)"
                               required>
                        <small class="form-hint">Password must be at least 8 characters long</small>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password"
                               class="auth-input"
                               id="confirm_password"
                               name="confirm_password"
                               placeholder="Confirm your password"
                               required>
                    </div>

                    <button type="submit" class="auth-button auth-button-primary">
                        Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    <p class="auth-footer-text">Already have an account?</p>
                    <a href="/login" class="auth-link">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
