<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonat AI Agent</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #fd7e14 0%, #ff9f43 100%);
        }

        .hero-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .hero-content {
            text-align: center;
            color: white;
            max-width: 800px;
            animation: fadeInUp 1s ease-out;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.2));
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .brand-name {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe4b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            margin-bottom: 3rem;
            opacity: 0.95;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: white;
            color: #fd7e14;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }

        /* Welcome back variant */
        .welcome-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 3rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: bounce 2s ease-in-out infinite;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-buttons {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .welcome-box {
                padding: 2rem 1.5rem;
            }
        }

        /* Background decoration */
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: pulse 4s ease-in-out infinite;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            bottom: 15%;
            right: 15%;
            animation-delay: 1s;
        }

        .circle-3 {
            width: 150px;
            height: 150px;
            top: 60%;
            left: 80%;
            animation-delay: 2s;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.1;
            }
        }

        /* Abstract animated elements */
        .illustration-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        /* Floating gradient orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            animation: floatOrb 25s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 70%);
            bottom: -15%;
            right: -10%;
            animation-delay: 8s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0) 70%);
            top: 50%;
            left: 50%;
            animation-delay: 16s;
        }

        @keyframes floatOrb {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(50px, -50px) scale(1.1);
            }
            66% {
                transform: translate(-30px, 30px) scale(0.9);
            }
        }

        /* Geometric shapes */
        .shape {
            position: absolute;
            opacity: 0.08;
            animation: rotate360 30s linear infinite;
        }

        .shape-1 {
            width: 120px;
            height: 120px;
            border: 3px solid white;
            border-radius: 20px;
            top: 15%;
            right: 15%;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 80px;
            height: 80px;
            border: 3px solid white;
            border-radius: 50%;
            bottom: 20%;
            left: 10%;
            animation-delay: 10s;
        }

        .shape-3 {
            width: 100px;
            height: 100px;
            border: 3px solid white;
            transform: rotate(45deg);
            top: 60%;
            right: 25%;
            animation-delay: 20s;
        }

        @keyframes rotate360 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Subtle grid pattern */
        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Abstract Animated Elements -->
    <div class="illustration-container">
        <!-- Subtle grid pattern -->
        <div class="grid-overlay"></div>
        
        <!-- Floating gradient orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        
        <!-- Geometric shapes -->
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="hero-container">
        <div class="hero-content" id="hero-content">
            <div class="logo">
                <i class="fas fa-brain"></i>
            </div>
            <h1 class="hero-title">
                <span >Bonat</span> AI Agent
            </h1>
            <p class="hero-subtitle">
                Business intelligence made simple. Ask questions in plain language.
            </p>
            <div class="hero-buttons" id="auth-buttons">
                <!-- Buttons populated by JavaScript -->
            </div>
        </div>

        <div class="hero-content" id="welcome-content" style="display: none;">
            <!-- Welcome back content populated by JavaScript -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('access_token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const authButtons = document.getElementById('auth-buttons');
            const heroContent = document.getElementById('hero-content');
            const welcomeContent = document.getElementById('welcome-content');
            
            if (token && user.name) {
                // User is logged in - show welcome
                heroContent.style.display = 'none';
                welcomeContent.style.display = 'block';
                
                welcomeContent.innerHTML = `
                    <div class="welcome-box">
                        <div class="welcome-icon">
                            <i class="fas fa-smile-beam"></i>
                        </div>
                        <h1 class="hero-title" style="font-size: clamp(2rem, 6vw, 3.5rem);">
                            Welcome Back!
                        </h1>
                        <p class="hero-subtitle">
                            Hi ${user.name}, ready to explore your business insights?
                        </p>
                        <div class="hero-buttons">
                            <a href="/chat" class="btn btn-primary">
                                <i class="fas fa-comments"></i>
                                Go to Chat
                            </a>
                            <button onclick="logout()" class="btn btn-secondary">
                                <i class="fas fa-sign-out-alt"></i>
                                Logout
                            </button>
                        </div>
                    </div>
                `;
            } else {
                // User is not logged in
                authButtons.innerHTML = `
                    <a href="/login" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </a>
                    <a href="/register" class="btn btn-secondary">
                        <i class="fas fa-user-plus"></i>
                        Create Account
                    </a>
                `;
            }
        });
        
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.reload();
        }
    </script>
</body>
</html>
